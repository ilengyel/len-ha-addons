name: Task Solver
version: 0.1.3
slug: task_solver
description: Touch-first task tracker for household chores and repeatable checklists.
url: https://example.invalid/ha-addons/tree/main/task_solver
startup: application
boot: auto
init: false
panel_icon: mdi:clipboard-check-outline
ingress: true
ingress_port: 8099
webui: http://[HOST]:[PORT:8099]/
homeassistant_api: false
map:
  - addon_config:rw
options:
  log_level: info
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Task Solver direct access port
arch:
  - aarch64
  - amd64
  - armv7
  - i386
